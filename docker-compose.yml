version: '3.8'

services:
  ui:
    build: .
    container_name: salesops-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped

  api:
    build: .
    container_name: salesops-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./outputs:/app/outputs
    restart: unless-stopped
